<!DOCTYPE html>
<!-- saved from url=(0094)file:///Users/lancastermatos/.gemini/antigravity/scratch/gerador-prompt-imobiliario/index.html -->
<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Script Imobiliário</title>
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="./Gerador de Script Imobiliário_files/css2" rel="stylesheet">
    <link rel="stylesheet" href="./Gerador de Script Imobiliário_files/style.css">
<style type="text/css" id="operaUserStyle"></style></head>
<body>
    <div class="container">
        <header>
            <h1>Gerador de Prompt</h1>
            <p>Atendimento Imobiliário de Alta Conversão</p>
        </header>

        <form id="promptForm">
            <div class="form-group">
                <label for="corretor">Nome do Corretor</label>
                <input type="text" id="corretor" placeholder="Ex: João Silva" required="">
            </div>

            <div class="form-group">
                <label for="empreendimento">Nome do Empreendimento</label>
                <input type="text" id="empreendimento" placeholder="Ex: Residencial Lumina" required="">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" placeholder="Ex: Pinheiros" required="">
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" placeholder="Ex: São Paulo" required="">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tipo">Estágio</label>
                    <select id="tipo" required="">
                        <option value="Na planta">Na planta</option>
                        <option value="Pronto">Pronto</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="padrao">Padrão</label>
                    <select id="padrao" required="">
                        <option value="Alto">Alto</option>
                        <option value="Médio">Médio</option>
                        <option value="Baixo">Baixo</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="publico">Público-alvo</label>
                <input type="text" id="publico" placeholder="Ex: Famílias buscando espaço, Investidores..." required="">
            </div>

            <div class="form-group">
                <label for="principal_diferencial">Principal Diferencial</label>
                <input type="text" id="principal_diferencial" placeholder="Ex: Vista panorâmica definitiva" required="">
            </div>

            <div class="form-group">
                <label for="outros_diferenciais">Outros Diferenciais</label>
                <textarea id="outros_diferenciais" rows="2" placeholder="Ex: Lazer completo, vaga para carro elétrico..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tipologias">Tipologias</label>
                    <input type="text" id="tipologias" placeholder="Ex: 2 e 3 quartos, studios..." required="">
                </div>
                <div class="form-group">
                    <label for="metragens">Metragens</label>
                    <input type="text" id="metragens" placeholder="Ex: 60m² a 120m²" required="">
                </div>
            </div>

            <div class="form-group">
                <label for="preco">Faixa de Preço (Opcional)</label>
                <input type="text" id="preco" placeholder="Ex: A partir de R$ 500.000">
            </div>

            <div class="form-group">
                <label for="localizacao">Destaques da Localização</label>
                <textarea id="localizacao" rows="2" placeholder="Ex: Próximo ao metrô, shopping a 5 minutos..." required=""></textarea>
            </div>

            <button type="submit" class="btn-generate">Gerar Prompt ✨</button>
        </form>

        <div id="resultContainer" class="result-container">
            <h2>Prompt Gerado</h2>
            <div class="prompt-box">
                <textarea id="generatedPrompt" readonly="" style="height: 10px;"></textarea>
            </div>
            <button id="copyBtn" class="btn-copy">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copiar Prompt
            </button>
        </div>
    </div>

    <script src="./Gerador de Script Imobiliário_files/script.js"></script>


</body></html>
